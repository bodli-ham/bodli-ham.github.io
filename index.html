<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bodli's Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 12px; width: 100%;">
                <h1><a href="index.html">bodli's Blog</a></h1>
                <nav class="category-nav">
                    <a href="index.html"                           class="cat-tab" data-category="">Total</a>
                    <a href="index.html?category=Case+Study"       class="cat-tab" data-category="Case Study">Case Study</a>
                    <a href="index.html?category=Data+Report"      class="cat-tab" data-category="Data Report">Data Report</a>

                    <a href="index.html?category=Supplement+Guide" class="cat-tab" data-category="Supplement Guide">Supplement Guide</a>
                    <a href="index.html?category=Note"             class="cat-tab" data-category="Note">Note</a>
                </nav>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환">🌓</button>
        </div>
    </header>

    <main class="container">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="게시글 검색...">
        </div>
        
        <div class="tags-container" id="tags-container">
            <!-- 태그들이 동적으로 추가됩니다 -->
        </div>

        <div class="posts-list" id="posts-list">
            <!-- 게시글 목록이 동적으로 추가됩니다 -->
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="current-year"></span> bodli. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
