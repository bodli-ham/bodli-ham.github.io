<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - bodli's Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/prism.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <!-- 필요한 언어 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div style="display: flex; align-items: center; gap: 20px;">
                <h1><a href="index.html">bodli's Blog 포폴 게시용</a></h1>
                <nav>
                    <a href="portfolio/index.html" style="color: var(--text-color); font-weight: 500;">Portfolio</a>
                </nav>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환">🌓</button>
        </div>
    </header>

    <main class="container post-container">
        <article>
            <div class="post-header">
                <h1 id="post-title">Loading...</h1>
                <div class="post-meta">
                    <span id="post-date"></span>
                    <span id="post-category" class="category"></span>
                </div>
                <div class="post-tags" id="post-tags"></div>
            </div>
            
            <div class="post-content" id="post-content">
                <!-- 마크다운 내용이 여기에 렌더링됩니다 -->
            </div>
        </article>

        <div class="giscus-container">
            <!-- Giscus 댓글이 동적으로 추가됩니다 -->
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="current-year"></span> bodli. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/post-loader.js"></script>
</body>
</html>
